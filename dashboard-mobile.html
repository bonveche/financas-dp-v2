<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dashboard — Finanças DP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F0F2F5; --surface: #FFFFFF; --s2: #E8EAF0; --s3: #F5F6FA;
  --border: #D8DAE0; --text: #1A1D2E; --muted: #888B9E;
  --orange: #F26522; --orange-l: #FEF0E8; --orange-d: #C44E0E;
  --green: #2E9E5B; --green-l: #E8F7EF;
  --red: #D93025; --red-l: #FDECEA;
  --yellow: #F59E0B; --yellow-l: #FEF9E7;
  --blue: #2E86C1; --blue-l: #E8F4FB;
  --purple: #7D3C98; --purple-l: #F5EEF8;
  --radius: 16px; --rsm: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 14px; -webkit-font-smoothing: antialiased;
  min-height: 100vh; padding-bottom: 40px;
}
#app { max-width: 480px; margin: 0 auto; }

.header {
  background: var(--orange); padding: 18px 20px 14px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 8px rgba(242,101,34,0.3); margin-bottom: 0;
}
.header h1 { font-size: 20px; font-weight: 800; color: #fff; }
.header p  { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 2px; }
.btn-refresh {
  background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
  color: #fff; border-radius: var(--rsm); padding: 8px 14px;
  font-size: 13px; font-weight: 700; cursor: pointer;
}

.month-scroll {
  display: flex; gap: 6px; overflow-x: auto; padding: 12px 16px 4px;
  scrollbar-width: none; background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.month-scroll::-webkit-scrollbar { display: none; }
.month-chip {
  flex-shrink: 0; padding: 6px 14px; border-radius: 99px;
  background: var(--s3); border: 1.5px solid var(--border);
  color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer;
}
.month-chip.active { background: var(--orange); border-color: var(--orange); color: #fff; }

.content { padding: 14px 16px; }

.config-banner {
  background: var(--yellow-l); border: 1.5px solid var(--yellow);
  border-radius: var(--radius); padding: 16px; margin-bottom: 14px;
}
.config-banner h3 { color: var(--yellow); font-size: 14px; margin-bottom: 6px; }
.config-banner p  { color: var(--muted); font-size: 12px; margin-bottom: 10px; line-height: 1.5; }
.config-input {
  width: 100%; background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--rsm); padding: 10px 12px; color: var(--text);
  font-size: 13px; font-family: inherit; outline: none; margin-bottom: 8px;
}
.btn-save {
  width: 100%; padding: 11px; background: var(--orange); color: #fff;
  border: none; border-radius: var(--rsm); font-size: 13px; font-weight: 700;
  font-family: inherit; cursor: pointer;
}

.loading {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 20px; color: var(--muted);
}
.loading.show { display: flex; }
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--orange); border-radius: 50%;
  animation: spin 1s linear infinite; margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.saldo-hero {
  background: linear-gradient(135deg, var(--orange), var(--orange-d));
  border-radius: var(--radius); padding: 20px; margin-bottom: 12px;
  box-shadow: 0 4px 16px rgba(242,101,34,0.25);
}
.saldo-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.saldo-value { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
.saldo-bar-bg { height: 5px; background: rgba(255,255,255,0.25); border-radius: 99px; overflow: hidden; margin-bottom: 5px; }
.saldo-bar    { height: 100%; border-radius: 99px; background: #fff; transition: width .5s; }
.saldo-pct    { font-size: 11px; color: rgba(255,255,255,0.8); }

.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.kpi {
  background: var(--surface); border-radius: var(--radius);
  padding: 14px; box-shadow: var(--shadow); border: 1px solid var(--border);
}
.kpi-label { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.kpi-value { font-size: 18px; font-weight: 800; }

.contas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.conta-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 14px; box-shadow: var(--shadow); border: 1px solid var(--border);
}
.conta-icon  { font-size: 18px; margin-bottom: 5px; }
.conta-label { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.conta-value { font-size: 16px; font-weight: 800; }

.split-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.split-card {
  background: var(--surface); border-radius: var(--rsm);
  padding: 12px 8px; text-align: center; box-shadow: var(--shadow); border: 1px solid var(--border);
}
.split-name { font-size: 10px; font-weight: 700; margin-bottom: 4px; }
.split-value { font-size: 13px; font-weight: 800; }

.section-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; margin-top: 4px; }

.chart-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border);
}
.chart-title { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 14px; }
.chart-wrap  { position: relative; height: 180px; }

.saldo-ant-card {
  background: var(--blue-l); border: 1px solid var(--blue);
  border-radius: var(--rsm); padding: 10px 14px; margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center;
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div><h1>💰 Dashboard</h1><p id="h-sub">Douglas & Priscila</p></div>
    <button class="btn-refresh" onclick="carregar()">🔄</button>
  </div>

  <div class="month-scroll" id="month-chips"></div>

  <div class="content">
    <div class="config-banner" id="config-banner" style="display:none">
      <h3>⚙️ Configure a URL do Apps Script</h3>
      <p>Cole a URL da sua implantação do Google Apps Script.</p>
      <input type="url" class="config-input" id="url-input" placeholder="https://script.google.com/macros/s/…/exec">
      <button class="btn-save" onclick="salvarUrl()">Salvar e carregar</button>
    </div>
    <div class="loading" id="loading"><div class="spinner"></div><div>Carregando…</div></div>
    <div id="dash"></div>
  </div>
</div>

<script>
const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
let scriptUrl = localStorage.getItem('dpv2_script_url') || localStorage.getItem('dp_script_url') || '';
let mesAtivo  = MESES[new Date().getMonth()];
let cache     = null;
let chartRef  = null;

function fmt(v) { return 'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function soma(arr,campo) { return (arr||[]).reduce((s,r)=>s+(parseFloat(r[campo])||0),0); }

// Chips de mês
function buildChips() {
  const wrap = document.getElementById('month-chips');
  wrap.innerHTML = '';
  MESES.forEach(m => {
    const c = document.createElement('div');
    c.className = 'month-chip' + (m===mesAtivo?' active':'');
    c.textContent = m.slice(0,3);
    c.onclick = () => {
      mesAtivo = m;
      wrap.querySelectorAll('.month-chip').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
      if(cache) renderDash(cache);
    };
    wrap.appendChild(c);
  });
  setTimeout(()=>{
    const a = wrap.querySelector('.active');
    if(a) a.scrollIntoView({inline:'center',behavior:'smooth'});
  },100);
}

window.onload = () => {
  buildChips();
  if(scriptUrl) { carregar(); }
  else { document.getElementById('config-banner').style.display='block'; }
};

function salvarUrl() {
  const url = document.getElementById('url-input').value.trim();
  if(!url) return;
  scriptUrl = url;
  localStorage.setItem('dpv2_script_url', url);
  document.getElementById('config-banner').style.display = 'none';
  carregar();
}

async function carregar() {
  if(!scriptUrl) { document.getElementById('config-banner').style.display='block'; return; }
  document.getElementById('loading').classList.add('show');
  document.getElementById('dash').innerHTML = '';
  if(chartRef) { try{chartRef.destroy();}catch(e){} chartRef=null; }
  try {
    const r = await fetch(scriptUrl+'?action=readAll&t='+Date.now());
    const d = await r.json();
    if(d.status!=='ok') throw new Error(d.message);
    cache = d;
    renderDash(d);
  } catch(e) {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('dash').innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--muted)">
      <div style="font-size:32px;margin-bottom:10px">⚠️</div>
      <div style="font-weight:700;color:var(--red);margin-bottom:6px">Erro ao carregar</div>
      <div style="font-size:12px;margin-bottom:14px">${e.message}</div>
      <button onclick="carregar()" style="background:var(--orange-l);border:1.5px solid var(--orange);color:var(--orange);border-radius:8px;padding:8px 20px;cursor:pointer;font-size:13px;font-weight:700">Tentar novamente</button>
    </div>`;
  }
}

function renderDash(data) {
  const varTx = data.transactions?.variaveis || [];
  const fixTx = data.transactions?.fixas     || [];
  const recTx = data.transactions?.receitas  || [];
  const contas = data.contas || JSON.parse(localStorage.getItem('dpv2_contas')||'{"reservaMensal":0,"reservaEmerg":0,"investimentos":0}');
  const dist   = JSON.parse(localStorage.getItem('dpv2_dist')||'{"reserva":10,"invest":10}');
  const fechamentos = data.fechamentos || JSON.parse(localStorage.getItem('dpv2_fechamentos')||'{}');

  const varMes = varTx.filter(r=>r['MÊS']===mesAtivo&&r['TIPO']!=='investimento'&&r['TIPO']!=='reserva');
  const fixMes = fixTx.filter(r=>r['MÊS']===mesAtivo);
  const recMes = recTx.filter(r=>r['MÊS']===mesAtivo);

  const receita  = soma(recMes,'VALOR (R$)');
  const despesas = soma(varMes,'VALOR (R$)') + soma(fixMes,'VALOR (R$)');

  const mesIdx   = MESES.indexOf(mesAtivo);
  const mesPrev  = mesIdx > 0 ? MESES[mesIdx-1] : null;
  const saldoAnt = mesPrev && fechamentos[mesPrev]?.saldoPassado || 0;
  const totalDisp = receita + saldoAnt;
  const saldo    = totalDisp - despesas;

  const pctRes  = (dist.reserva||10)/100;
  const pctInv  = (dist.invest||10)/100;
  const poupar  = saldo>0 ? receita*pctRes : 0;
  const investir = saldo>0 ? receita*pctInv  : 0;
  const pct     = totalDisp>0 ? Math.min(100,despesas/totalDisp*100) : 0;

  const despD = [...varMes,...fixMes].filter(r=>r['TITULAR']==='Douglas').reduce((s,r)=>s+(parseFloat(r['VALOR (R$)'])||0),0);
  const despP = [...varMes,...fixMes].filter(r=>r['TITULAR']==='Priscila').reduce((s,r)=>s+(parseFloat(r['VALOR (R$)'])||0),0);
  const despC = [...varMes,...fixMes].filter(r=>r['TITULAR']==='Casal').reduce((s,r)=>s+(parseFloat(r['VALOR (R$)'])||0),0);

  const anuais = MESES.map(m=>{
    const rec=soma(recTx.filter(r=>r['MÊS']===m),'VALOR (R$)');
    const des=soma([...varTx.filter(r=>r['TIPO']!=='investimento'&&r['TIPO']!=='reserva'),...fixTx].filter(r=>r['MÊS']===m),'VALOR (R$)');
    return {rec,des,sal:rec-des};
  });

  document.getElementById('h-sub').textContent = mesAtivo+' '+new Date().getFullYear();
  document.getElementById('loading').classList.remove('show');

  const saldoColor = saldo>=0?'#fff':'#FFD166';
  const barColor   = pct>80?'#FFD166':'rgba(255,255,255,0.9)';

  document.getElementById('dash').innerHTML = `
    ${saldoAnt>0?`<div class="saldo-ant-card">
      <span style="font-size:12px;color:var(--blue);font-weight:600">💰 Saldo anterior</span>
      <span style="font-size:14px;font-weight:800;color:var(--blue)">${fmt(saldoAnt)}</span>
    </div>`:''}

    <div class="saldo-hero">
      <div class="saldo-label">Saldo do mês</div>
      <div class="saldo-value" style="color:${saldoColor}">${fmt(saldo)}</div>
      <div class="saldo-bar-bg"><div class="saldo-bar" style="width:${pct}%;background:${barColor}"></div></div>
      <div class="saldo-pct">${pct.toFixed(0)}% comprometido · ${[...varMes,...fixMes,...recMes].length} lançamentos</div>
    </div>

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">💵 Receita</div><div class="kpi-value" style="color:var(--green)">${fmt(receita)}</div></div>
      <div class="kpi"><div class="kpi-label">💸 Despesas</div><div class="kpi-value" style="color:var(--red)">${fmt(despesas)}</div></div>
      <div class="kpi"><div class="kpi-label">🐷 Guardar (${Math.round(pctRes*100)}%)</div><div class="kpi-value" style="color:var(--orange)">${fmt(poupar)}</div></div>
      <div class="kpi"><div class="kpi-label">🎯 Investir (${Math.round(pctInv*100)}%)</div><div class="kpi-value" style="color:var(--blue)">${fmt(investir)}</div></div>
    </div>

    <div class="section-label">CONTAS VIRTUAIS</div>
    <div class="contas-grid">
      <div class="conta-card"><div class="conta-icon">💧</div><div class="conta-label">Reserva Mensal</div><div class="conta-value" style="color:var(--blue)">${fmt(contas.reservaMensal||0)}</div></div>
      <div class="conta-card"><div class="conta-icon">🔒</div><div class="conta-label">Reserva Emerg.</div><div class="conta-value" style="color:var(--green)">${fmt(contas.reservaEmerg||0)}</div></div>
    </div>
    <div class="kpi" style="margin-bottom:12px"><div class="kpi-label">💰 Investimentos</div><div class="kpi-value" style="color:var(--orange)">${fmt(contas.investimentos||0)}</div></div>

    <div class="section-label">DESPESAS POR TITULAR</div>
    <div class="split-row">
      <div class="split-card"><div class="split-name" style="color:var(--blue)">👨 Douglas</div><div class="split-value" style="color:var(--blue)">${fmt(despD)}</div></div>
      <div class="split-card"><div class="split-name" style="color:var(--purple)">👩 Priscila</div><div class="split-value" style="color:var(--purple)">${fmt(despP)}</div></div>
      <div class="split-card"><div class="split-name" style="color:var(--green)">💑 Casal</div><div class="split-value" style="color:var(--green)">${fmt(despC)}</div></div>
    </div>

    <div class="section-label">EVOLUÇÃO ${new Date().getFullYear()}</div>
    <div class="chart-card">
      <div class="chart-title">Receita · Despesas · Saldo</div>
      <div class="chart-wrap"><canvas id="chart-linha"></canvas></div>
    </div>
  `;

  requestAnimationFrame(()=>{
    const ctx = document.getElementById('chart-linha');
    if(!ctx) return;
    chartRef = new Chart(ctx,{
      type:'line',
      data:{
        labels:MESES.map(m=>m.slice(0,3)),
        datasets:[
          {label:'Receita', data:anuais.map(d=>d.rec),borderColor:'#2E9E5B',backgroundColor:'rgba(46,158,91,0.08)',tension:.4,pointRadius:3,borderWidth:2,fill:true},
          {label:'Despesas',data:anuais.map(d=>d.des),borderColor:'#D93025',backgroundColor:'rgba(217,48,37,0.08)',tension:.4,pointRadius:3,borderWidth:2,fill:true},
          {label:'Saldo',   data:anuais.map(d=>d.sal),borderColor:'#F26522',backgroundColor:'transparent',tension:.4,pointRadius:3,borderWidth:2,borderDash:[4,4]},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#888B9E',font:{size:10},boxWidth:10}}},
        scales:{
          x:{ticks:{color:'#888B9E',font:{size:10}},grid:{color:'rgba(0,0,0,0.05)'}},
          y:{ticks:{color:'#888B9E',font:{size:10},callback:v=>'R$'+(Math.abs(v)/1000).toFixed(0)+'k'},grid:{color:'rgba(0,0,0,0.05)'}},
        }
      }
    });
  });
}
</script>
</body>
</html>
